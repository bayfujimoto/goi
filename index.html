<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="語彙">
<meta name="theme-color" content="#1a1410">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>語彙</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --paper-dark: #ede7d9;
    --paper-mid: #e8e0d0;
    --red: #c0392b;
    --red-soft: #f0ddd9;
    --gold: #9a7200;
    --gold-soft: #f0e6c0;
    --green: #2d6a4f;
    --green-soft: #d0e8dc;
    --blue: #2471a3;
    --blue-soft: #d0e4f0;
    --muted: #8a7f72;
    --border: #d4c9b8;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    max-width: 520px;
    margin: 0 auto;
    position: relative;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  /* ── SCREENS ── */
  .screen {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
    padding: 0 20px;
    padding-top: calc(var(--safe-top) + 16px);
    padding-bottom: calc(var(--safe-bottom) + 16px);
  }
  .screen.active { display: flex; }

  /* ── HEADER ── */
  .app-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .app-header h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  .app-header .sub {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── HOME SCREEN ── */
  #screen-home { gap: 20px; }

  .home-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .home-stat {
    background: var(--paper);
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .home-stat-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .home-stat-value {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
  }

  .due-badge {
    color: var(--red);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px 20px;
    border-radius: 3px;
    border: 1px solid;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    text-align: center;
    line-height: 1.3;
    width: 100%;
    -webkit-appearance: none;
  }

  .btn-primary {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }
  .btn-primary:active { background: #3a3028; }

  .btn-secondary {
    background: transparent;
    border-color: var(--border);
    color: var(--ink);
  }
  .btn-secondary:active { background: var(--paper-dark); }

  .btn-sm {
    padding: 10px 16px;
    font-size: 11px;
  }

  .btn-group { display: flex; flex-direction: column; gap: 10px; }

  .import-notice {
    background: var(--gold-soft);
    border: 1px solid #c9a227;
    border-radius: 3px;
    padding: 14px 16px;
    font-size: 11px;
    line-height: 1.6;
    color: var(--gold);
  }

  .word-list-preview {
    background: var(--paper-dark);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 16px;
    font-size: 11px;
    line-height: 2;
    max-height: 160px;
    overflow-y: auto;
    color: var(--muted);
  }

  .word-list-preview .word-item {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding: 2px 0;
  }
  .word-list-preview .word-item:last-child { border-bottom: none; }

  .word-kanji { font-family: 'Shippori Mincho', serif; font-size: 14px; color: var(--ink); }
  .word-reading { color: var(--muted); font-size: 10px; }

  /* ── STUDY SCREEN ── */
  #screen-study {
    gap: 16px;
    overflow: hidden;
  }

  .study-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .study-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .progress-wrap {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .progress-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .mini-stats {
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }

  .mini-stat { font-size: 11px; color: var(--muted); }
  .mini-stat strong { color: var(--ink); }
  .ms-again strong { color: var(--red); }
  .ms-good strong { color: var(--green); }

  /* ── CARD ── */
  .card-wrap {
    flex: 1;
    perspective: 1200px;
    cursor: pointer;
    min-height: 0;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    box-shadow: 2px 4px 0 var(--border);
  }

  .card-front { background: #fff; }
  .card-back { background: var(--paper); transform: rotateY(180deg); }

  .card-jlpt {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 9px;
    padding: 3px 7px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.06em;
    border-radius: 2px;
  }

  .card-counter {
    position: absolute;
    top: 14px;
    left: 14px;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .card-kanji {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(52px, 14vw, 80px);
    font-weight: 600;
    line-height: 1;
    color: var(--ink);
    text-align: center;
  }

  .tap-hint {
    position: absolute;
    bottom: 16px;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--border);
  }

  .card-kanji-small {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    color: var(--muted);
    margin-bottom: 14px;
    text-align: center;
  }

  .card-furigana {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(28px, 8vw, 42px);
    color: var(--ink);
    margin-bottom: 8px;
    text-align: center;
  }

  .card-divider {
    width: 28px;
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  .card-definition {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
    max-width: 260px;
  }

  /* ── RATING ── */
  .rating-area {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .rating-hint {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .rating-btns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
  }

  .r-btn {
    padding: 12px 4px;
    border-radius: 3px;
    border: 1px solid;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.12s;
    text-align: center;
    -webkit-appearance: none;
  }

  .r-btn .r-sub { display: block; font-size: 9px; opacity: 0.65; margin-top: 3px; }

  .r-again { background: var(--red-soft); border-color: var(--red); color: var(--red); }
  .r-again:active { background: var(--red); color: #fff; }
  .r-hard { background: var(--gold-soft); border-color: var(--gold); color: var(--gold); }
  .r-hard:active { background: var(--gold); color: #fff; }
  .r-good { background: var(--green-soft); border-color: var(--green); color: var(--green); }
  .r-good:active { background: var(--green); color: #fff; }
  .r-easy { background: var(--blue-soft); border-color: var(--blue); color: var(--blue); }
  .r-easy:active { background: var(--blue); color: #fff; }

  /* ── DONE SCREEN ── */
  #screen-done {
    gap: 24px;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .done-kanji {
    font-family: 'Shippori Mincho', serif;
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .done-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 600;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .done-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    width: 100%;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .done-stat {
    background: var(--paper);
    padding: 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .done-stat-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .done-stat-value {
    font-family: 'Shippori Mincho', serif;
    font-size: 32px;
    font-weight: 600;
    line-height: 1;
  }

  .done-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 20px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    font-size: 11px;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="app-header">
    <h1>語彙</h1>
    <span class="sub">Word Bank SRS</span>
  </div>

  <div id="home-stats" class="home-stats">
    <div class="home-stat">
      <span class="home-stat-label">Total</span>
      <span class="home-stat-value" id="hs-total">0</span>
    </div>
    <div class="home-stat">
      <span class="home-stat-label">Due now</span>
      <span class="home-stat-value due-badge" id="hs-due">0</span>
    </div>
    <div class="home-stat">
      <span class="home-stat-label">Learned</span>
      <span class="home-stat-value" id="hs-learned">0</span>
    </div>
  </div>

  <div id="word-preview-section">
    <div class="section-label">Your words</div>
    <div class="word-list-preview" id="word-preview">
      <span style="color:var(--muted);font-size:11px">No words yet — import your word bank below</span>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="btn-study" onclick="startStudy()">→ Study Due Cards</button>
    <button class="btn btn-secondary" onclick="importFile()">↑ Import Word Bank (.md)</button>
    <button class="btn btn-secondary btn-sm" onclick="studyAll()">Study All Words</button>
  </div>

  <div id="import-notice" class="import-notice hidden">
    <span id="import-notice-text"></span>
  </div>
</div>

<!-- STUDY -->
<div id="screen-study" class="screen">
  <div class="study-header" style="flex-shrink:0">
    <span class="study-title">Review Session</span>
    <button class="btn btn-secondary btn-sm" style="width:auto;padding:8px 14px" onclick="goHome()">← Home</button>
  </div>

  <div class="progress-wrap" style="flex-shrink:0">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="mini-stats" style="flex-shrink:0">
    <span class="mini-stat ms-again">Again: <strong id="ms-again">0</strong></span>
    <span class="mini-stat ms-good">Good: <strong id="ms-good">0</strong></span>
    <span class="mini-stat" style="margin-left:auto">Queue: <strong id="ms-queue">0</strong></span>
  </div>

  <div class="card-wrap" id="card-wrap" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face card-front">
        <span class="card-counter" id="card-counter"></span>
        <span class="card-jlpt" id="card-jlpt-front"></span>
        <div class="card-kanji" id="card-kanji">—</div>
        <span class="tap-hint">tap to reveal</span>
      </div>
      <div class="card-face card-back">
        <span class="card-jlpt" id="card-jlpt-back"></span>
        <div class="card-kanji-small" id="card-kanji-back">—</div>
        <div class="card-furigana" id="card-furigana">—</div>
        <div class="card-divider"></div>
        <div class="card-definition" id="card-definition">—</div>
      </div>
    </div>
  </div>

  <div class="rating-area" id="rating-area" style="display:none;flex-shrink:0">
    <div class="rating-hint">how did you do?</div>
    <div class="rating-btns">
      <button class="r-btn r-again" onclick="rate(0)">Again<span class="r-sub">forgot</span></button>
      <button class="r-btn r-hard" onclick="rate(1)">Hard<span class="r-sub">struggled</span></button>
      <button class="r-btn r-good" onclick="rate(2)">Good<span class="r-sub">got it</span></button>
      <button class="r-btn r-easy" onclick="rate(3)">Easy<span class="r-sub">instant</span></button>
    </div>
  </div>
</div>

<!-- DONE -->
<div id="screen-done" class="screen">
  <div class="done-kanji">完</div>
  <div class="done-title">Session complete</div>
  <div class="done-grid">
    <div class="done-stat">
      <span class="done-stat-label">Reviewed</span>
      <span class="done-stat-value" id="done-reviewed">0</span>
    </div>
    <div class="done-stat">
      <span class="done-stat-label">Again</span>
      <span class="done-stat-value" style="color:var(--red)" id="done-again">0</span>
    </div>
    <div class="done-stat">
      <span class="done-stat-label">Good+</span>
      <span class="done-stat-value" style="color:var(--green)" id="done-good">0</span>
    </div>
  </div>
  <div class="done-actions">
    <button class="btn btn-primary" onclick="restartSession()">→ Study Again</button>
    <button class="btn btn-secondary" onclick="goHome()">← Home</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept=".md,.txt" style="display:none" onchange="handleFile(event)">

<script>
// ── STORAGE ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'goi_cards_v2';

function loadDB() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveDB(db) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
}

// ── SRS (SM-2) ────────────────────────────────────────────────────────────────
function makeCardData() {
  return { interval: 0, easeFactor: 2.5, repetitions: 0, due: Date.now(), lapses: 0 };
}

function applyRating(cardData, quality) {
  const smQ = [0, 2, 4, 5][quality];
  if (smQ < 3) {
    cardData.repetitions = 0;
    cardData.interval = 1;
    cardData.lapses = (cardData.lapses || 0) + 1;
  } else {
    if (cardData.repetitions === 0) cardData.interval = 1;
    else if (cardData.repetitions === 1) cardData.interval = 4;
    else cardData.interval = Math.round(cardData.interval * cardData.easeFactor);
    cardData.repetitions++;
  }
  cardData.easeFactor = Math.max(1.3,
    cardData.easeFactor + 0.1 - (5 - smQ) * (0.08 + (5 - smQ) * 0.02)
  );
  cardData.due = Date.now() + cardData.interval * 86400000;
}

// ── PARSING ───────────────────────────────────────────────────────────────────
function parseWordBank(text) {
  const words = {};
  for (const line of text.split('\n')) {
    const t = line.trim();
    if (!t || /^[|\s]*[-:]+[|\s]*$/.test(t)) continue;
    if (/JLPT|Word|Furigana|Definition/i.test(t) && t.includes('|')) continue;

    const parts = t.split('|').map(p => p.trim()).filter((_, i, a) => i > 0 && i < a.length - 1);
    if (parts.length < 2) continue;

    let jlpt = '', word = '', furigana = '', definition = '';

    // detect format
    if (parts.length >= 4 && /^N[1-5]$|^$/.test(parts[0])) {
      // | JLPT | Word | Furigana | Definition | Date |
      [jlpt, word, furigana, definition] = parts;
    } else if (parts[0].match(/^\d{4}-\d{2}-\d{2}$/)) {
      // | Date | Word | Furigana | Definition |
      [, word, furigana, definition] = parts;
    } else if (parts.length >= 3) {
      [word, furigana, definition] = parts;
    } else if (parts.length === 2) {
      [word, furigana] = parts;
    }

    word = word.trim();
    if (!word) continue;

    // deduplicate by word
    if (!words[word]) {
      words[word] = { word, furigana: furigana.trim(), definition: definition.trim(), jlpt: jlpt.trim() };
    }
  }
  return Object.values(words);
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let db = loadDB();           // { [word]: cardData }
let wordMeta = {};           // { [word]: { furigana, definition, jlpt } }
let queue = [];
let currentCard = null;
let isFlipped = false;
let sessionAgain = 0;
let sessionGood = 0;
let sessionReviewed = 0;
let sessionTotal = 0;

// restore wordMeta from localStorage too
try {
  wordMeta = JSON.parse(localStorage.getItem('goi_meta_v2')) || {};
} catch { wordMeta = {}; }

function saveMeta() {
  localStorage.setItem('goi_meta_v2', JSON.stringify(wordMeta));
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function updateHomeUI() {
  const now = Date.now();
  const words = Object.keys(db);
  const due = words.filter(w => (db[w].due || 0) <= now);
  const learned = words.filter(w => (db[w].repetitions || 0) > 0);

  document.getElementById('hs-total').textContent = words.length;
  document.getElementById('hs-due').textContent = due.length;
  document.getElementById('hs-learned').textContent = learned.length;

  const preview = document.getElementById('word-preview');
  if (words.length === 0) {
    preview.innerHTML = '<span style="color:var(--muted);font-size:11px">No words yet — import your word bank below</span>';
  } else {
    const sorted = words.sort((a, b) => (db[b].due || 0) - (db[a].due || 0));
    preview.innerHTML = sorted.map(w => {
      const m = wordMeta[w] || {};
      return `<div class="word-item">
        <span class="word-kanji">${w}</span>
        <span class="word-reading">${m.furigana || ''}</span>
      </div>`;
    }).join('');
  }

  document.getElementById('btn-study').disabled = due.length === 0;
  document.getElementById('btn-study').textContent = due.length > 0
    ? `→ Study ${due.length} Due Card${due.length !== 1 ? 's' : ''}`
    : '→ No Cards Due';
}

// ── FILE IMPORT ───────────────────────────────────────────────────────────────
function importFile() {
  document.getElementById('file-input').click();
}

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const words = parseWordBank(e.target.result);
    if (words.length === 0) {
      showToast('Could not parse any words');
      return;
    }

    let added = 0;
    for (const w of words) {
      if (!db[w.word]) {
        db[w.word] = makeCardData();
        added++;
      }
      wordMeta[w.word] = { furigana: w.furigana, definition: w.definition, jlpt: w.jlpt };
    }

    saveDB(db);
    saveMeta();
    updateHomeUI();

    const notice = document.getElementById('import-notice');
    notice.classList.remove('hidden');
    document.getElementById('import-notice-text').textContent =
      `Imported ${words.length} words (${added} new, ${words.length - added} already known).`;

    showToast(`+${added} new words added`);
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── STUDY ─────────────────────────────────────────────────────────────────────
function startStudy() {
  const now = Date.now();
  const due = Object.keys(db).filter(w => (db[w].due || 0) <= now);
  if (due.length === 0) { showToast('No cards due right now'); return; }
  beginSession(due);
}

function studyAll() {
  const all = Object.keys(db);
  if (all.length === 0) { showToast('Import a word bank first'); return; }
  beginSession(all);
}

function beginSession(words) {
  queue = words.map(w => ({ word: w, ...wordMeta[w], ...db[w] }));
  shuffle(queue);
  sessionAgain = 0;
  sessionGood = 0;
  sessionReviewed = 0;
  sessionTotal = queue.length;
  showScreen('study');
  nextCard();
}

function nextCard() {
  updateMiniStats();
  if (queue.length === 0) { showDone(); return; }
  currentCard = queue.shift();
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('card-kanji').textContent = currentCard.word;
  document.getElementById('card-kanji-back').textContent = currentCard.word;
  document.getElementById('card-furigana').textContent = currentCard.furigana || currentCard.word;
  document.getElementById('card-definition').textContent = currentCard.definition || '(no definition)';
  const jlpt = currentCard.jlpt || '';
  document.getElementById('card-jlpt-front').textContent = jlpt;
  document.getElementById('card-jlpt-back').textContent = jlpt;
  document.getElementById('card-counter').textContent =
    `${sessionReviewed + 1} / ${sessionTotal}`;
  document.getElementById('rating-area').style.display = 'none';
  updateProgress();
}

function flipCard() {
  if (!currentCard) return;
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  document.getElementById('rating-area').style.display = isFlipped ? 'flex' : 'none';
  if (isFlipped) document.getElementById('rating-area').style.flexDirection = 'column';
}

function rate(quality) {
  if (!currentCard) return;
  const word = currentCard.word;
  applyRating(db[word], quality);
  saveDB(db);
  sessionReviewed++;

  if (quality === 0) {
    sessionAgain++;
    queue.splice(Math.min(3, queue.length), 0, currentCard);
    sessionTotal++;
  } else {
    sessionGood++;
  }
  nextCard();
}

function updateMiniStats() {
  document.getElementById('ms-again').textContent = sessionAgain;
  document.getElementById('ms-good').textContent = sessionGood;
  document.getElementById('ms-queue').textContent = queue.length;
}

function updateProgress() {
  const done = sessionReviewed;
  const total = sessionReviewed + queue.length;
  const pct = total > 0 ? (done / total) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function showDone() {
  document.getElementById('done-reviewed').textContent = sessionReviewed;
  document.getElementById('done-again').textContent = sessionAgain;
  document.getElementById('done-good').textContent = sessionGood;
  showScreen('done');
}

function restartSession() {
  studyAll();
}

function goHome() {
  updateHomeUI();
  showScreen('home');
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
updateHomeUI();

// Service worker registration for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
